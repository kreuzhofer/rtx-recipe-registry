recipe_version: "2"
model: Qwen/Qwen3-4B
runtime: vllm
container: rtx-vllm:latest   # entrypoint-less wrapper (see ../../images/) — required for sparkrun on amd64

metadata:
  description: Qwen3 4B (bf16) — amd64 + NVIDIA RTX, 32GB class (e.g. RTX 5090)
  maintainer: kreuzhofer
  model_params: 4B
  model_dtype: bf16
  category: chat

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 16384
  served_model_name: qwen3-4b

executor_config:
  devices: []                 # drop sparkrun's rootless --device /dev/infiniband (no InfiniBand on RTX hosts)
  restart_policy: unless-stopped

command: |
  vllm serve {model} \
      --served-model-name {served_model_name} \
      --host {host} \
      --port {port} \
      --tensor-parallel-size {tensor_parallel} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      --max-model-len {max_model_len} \
      --trust-remote-code
