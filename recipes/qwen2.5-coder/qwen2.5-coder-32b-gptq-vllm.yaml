recipe_version: "2"
model: Qwen/Qwen2.5-Coder-32B-Instruct-GPTQ-Int4
runtime: vllm
container: rtx-vllm:latest   # entrypoint-less wrapper (see ../../images/)
  # code int4 — GPTQ alternative to the AWQ build (which segfaulted on load on sm_120)
metadata:
  description: Qwen2.5-Coder-32B-Instruct GPTQ-Int4 — amd64 + NVIDIA RTX (32GB)
  maintainer: kreuzhofer
  category: chat
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.90
  max_model_len: 8192
  quantization: gptq_marlin
executor_config:
  devices: []
  restart_policy: unless-stopped
command: |
  vllm serve {model} --host {host} --port {port} -tp {tensor_parallel} --gpu-memory-utilization {gpu_memory_utilization} --max-model-len {max_model_len} --quantization {quantization} --enable-auto-tool-choice --tool-call-parser hermes --trust-remote-code
