recipe_version: "2"
model: Qwen/Qwen3.5-9B
runtime: vllm
container: rtx-vllm:latest   # entrypoint-less wrapper (see ../../images/)
metadata:
  description: Qwen3.5-9B — amd64 + NVIDIA RTX (32GB, e.g. RTX 5090)
  maintainer: kreuzhofer
  category: chat
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 16384
  quantization: fp8
executor_config:
  devices: []                 # drop sparkrun rootless --device /dev/infiniband (no IB on RTX)
  restart_policy: unless-stopped
command: |
  vllm serve {model} --host {host} --port {port} -tp {tensor_parallel} --gpu-memory-utilization {gpu_memory_utilization} --max-model-len {max_model_len} --quantization {quantization} --enable-auto-tool-choice --tool-call-parser hermes --reasoning-parser deepseek_r1 --trust-remote-code
