recipe_version: "2"
model: meta-llama/Llama-3.1-8B-Instruct
runtime: vllm
container: rtx-vllm:latest   # entrypoint-less wrapper (see ../../images/) — required for sparkrun on amd64

metadata:
  description: Llama 3.1 8B Instruct (fp8 dynamic) — amd64 + NVIDIA RTX, 32GB class (e.g. RTX 5090)
  maintainer: kreuzhofer
  model_params: 8B
  model_dtype: fp8
  category: chat

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 16384
  served_model_name: llama3.1-8b
  quantization: fp8

executor_config:
  devices: []                 # drop sparkrun's rootless --device /dev/infiniband (no InfiniBand on RTX hosts)
  restart_policy: unless-stopped

# Gated model on Hugging Face — the agent's HF_TOKEN must have access for the download to succeed.
command: |
  vllm serve {model} \
      --served-model-name {served_model_name} \
      --host {host} \
      --port {port} \
      --tensor-parallel-size {tensor_parallel} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      --max-model-len {max_model_len} \
      --quantization {quantization}
