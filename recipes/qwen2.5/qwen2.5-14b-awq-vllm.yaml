recipe_version: "2"
model: Qwen/Qwen2.5-14B-Instruct-AWQ
runtime: vllm
container: rtx-vllm:latest   # entrypoint-less wrapper (see ../../images/) — required for sparkrun on amd64

metadata:
  description: Qwen2.5 14B Instruct (AWQ int4) — amd64 + NVIDIA RTX, 32GB class (e.g. RTX 5090)
  maintainer: kreuzhofer
  model_params: 14B
  model_dtype: int4
  category: chat

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.90
  max_model_len: 16384
  served_model_name: qwen2.5-14b
  quantization: awq_marlin

executor_config:
  devices: []                 # drop sparkrun's rootless --device /dev/infiniband (no InfiniBand on RTX hosts)
  restart_policy: unless-stopped

# Pre-quantized AWQ int4 checkpoint (~10GB weights) — the largest model that fits 32GB comfortably.
command: |
  vllm serve {model} \
      --served-model-name {served_model_name} \
      --host {host} \
      --port {port} \
      --tensor-parallel-size {tensor_parallel} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      --max-model-len {max_model_len} \
      --quantization {quantization} \
      --trust-remote-code
